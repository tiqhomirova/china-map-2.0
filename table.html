<style>
  :root{
    --bg:#fff;--card:#f7f8fa;--card-h:#eef0f3;--border:#e3e6ec;
    --text:#1a1d23;--muted:#6b7280;
    --accent:#ff5b3a;--accent2:#1a73e8;

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;background:var(--bg);color:var(--text)}

  h1{margin:0 0 10px;font-size:18px;font-weight:600}
  h1 .count{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
  .filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:7px}
  .search{flex:1;min-width:220px;max-width:400px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font:inherit;outline:none}
  .search:focus{border-color:var(--accent2)}
  .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:18px;background:#fff;border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12.5px;user-select:none;transition:all .12s}
  .chip:hover{background:var(--card-h)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.city.active{background:var(--accent2);border-color:var(--accent2)}
  .chip .n{opacity:.7;margin-left:5px;font-size:11.5px}
  .chip .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
  .group{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .group-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
  .actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;padding-top:7px;border-top:1px solid var(--border)}

  .table-wrap{padding:14px 20px}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;font-size:13px}
  thead th{background:var(--card);text-align:left;padding:10px 12px;font-weight:600;color:var(--muted);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);position:sticky;top:0;cursor:pointer;user-select:none}
  thead th:hover{background:var(--card-h);color:var(--text)}
  thead th.sort-asc::after{content:' ↑';color:var(--accent2)}
  thead th.sort-desc::after{content:' ↓';color:var(--accent2)}
  tbody tr{border-bottom:1px solid var(--border)}
  tbody tr:last-child{border-bottom:0}
  tbody tr:hover{background:var(--card)}
  td{padding:10px 12px;vertical-align:top}
  td.name{font-weight:600;min-width:170px}
  td.cat{white-space:nowrap}
  td.city{white-space:nowrap;font-size:12px;color:var(--muted)}
  td.addr{font-size:12.5px;color:var(--muted);min-width:220px;max-width:320px}
  td.addr-cn{font-size:12.5px;min-width:200px;max-width:300px}
  td.links{white-space:nowrap}
  td.links a{display:inline-flex;align-items:center;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:#fff;text-decoration:none;font-size:11px;font-weight:500;margin-right:4px;transition:all .12s}
  td.links a:hover{background:var(--card-h);border-color:#c8cdd6}
  td.links a.gm{color:#ea4335}
  td.links a.am{color:#0091ea}
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:500;letter-spacing:.02em;gap:4px;white-space:nowrap}
  .badge .dot{width:7px;height:7px;border-radius:50%}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}

  @media(max-width:840px){
    .table-wrap{padding:8px 10px}
    table{font-size:12px}
    td.addr-cn{display:none}
  }
</style>
</head>

const CAT_COLOR = {
  'Ресторан':'#ef4444','Кофейня':'#f97316','Шопинг':'#a855f7',
  'Отель':'#3b82f6','Достопримечательность':'#22c55e',
  'Развлечения':'#eab308','Другое':'#94a3b8'
};
const catColor = c => CAT_COLOR[c] || '#94a3b8';

const state = { city:'all', cats:new Set(), q:'', sort:{field:'default', dir:'asc'} };

function escape(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function uniqueCounts(field){
  const m = new Map();
  for (const r of DATA) m.set(r[field], (m.get(r[field])||0)+1);
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}

function mkChip(label,n,active,extra,dotColor){
  const e = document.createElement('span');
  e.className = 'chip ' + (extra||'') + (active?' active':'');
  const dot = dotColor ? `<span class="dot" style="background:${dotColor}"></span>` : '';
  e.innerHTML = `${dot}${label}<span class="n">${n}</span>`;
  return e;
}

function renderCityChips(){
  const box = document.getElementById('cities'); box.innerHTML='';
  const all = mkChip('Все', DATA.length, state.city==='all', 'city');
  all.onclick=()=>{state.city='all'; render();}; box.appendChild(all);
  for (const [c,n] of uniqueCounts('city')){
    const e = mkChip(c,n,state.city===c,'city');
    e.onclick=()=>{state.city=c; render();}; box.appendChild(e);
  }
}

function renderCatChips(){
  const box = document.getElementById('cats'); box.innerHTML='';
  for (const [c,n] of uniqueCounts('category')){
    const e = mkChip(c,n,state.cats.has(c),'',catColor(c));
    e.onclick=()=>{ state.cats.has(c)?state.cats.delete(c):state.cats.add(c); render(); };
    box.appendChild(e);
  }
}

const cat_order = {'Кофейня':1,'Ресторан':2,'Шопинг':3,'Достопримечательность':4,'Развлечения':5,'Отель':6,'Другое':7};
const city_order = {'Shanghai':1,'Chongqing':2};

function filtered(){
  const q = state.q.trim().toLowerCase();
  let out = DATA.filter(r=>{
    if (state.city!=='all' && r.city!==state.city) return false;
    if (state.cats.size && !state.cats.has(r.category)) return false;
    if (q){
      const hay = `${r.name} ${r.addr_en||''} ${r.addr_cn||''} ${r.category}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  // Default sort: city → category → name (Shanghai first, Cafes/Restaurants first)
  if (!state.sort.field || state.sort.field === 'default'){
    out.sort((a,b)=>{
      const ca = (city_order[a.city]||99) - (city_order[b.city]||99);
      if (ca) return ca;
      const ka = (cat_order[a.category]||99) - (cat_order[b.category]||99);
      if (ka) return ka;
      return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
    });
    return out;
  }
  // User clicked column header — single-key sort
  const f = state.sort.field;
  const d = state.sort.dir === 'asc' ? 1 : -1;
  out.sort((a,b) => {
    let av, bv;
    if (f === 'category') { av = cat_order[a.category]||99; bv = cat_order[b.category]||99; }
    else if (f === 'city') { av = city_order[a.city]||99; bv = city_order[b.city]||99; }
    else { av = (a[f]||'').toString().toLowerCase(); bv = (b[f]||'').toString().toLowerCase(); }
    if (av < bv) return -1*d;
    if (av > bv) return 1*d;
    return 0;
  });
  return out;
}

function renderTable(){
  const list = filtered();
  document.getElementById('count').textContent = `${list.length} из ${DATA.length}`;
  const tbody = document.getElementById('tbody');
  if (!list.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Ничего не найдено</td></tr>';
  } else {
    tbody.innerHTML = list.map(r => `
      <tr>
        <td class="name">${escape(r.name)}</td>
        <td class="cat"><span class="badge" style="background:${catColor(r.category)}22;color:${catColor(r.category)}"><span class="dot" style="background:${catColor(r.category)}"></span>${escape(r.category)}</span></td>
        <td class="city">${escape(r.city)}</td>
        <td class="addr">${escape(r.addr_en)}</td>
        <td class="addr-cn">${escape(r.addr_cn)}</td>
        <td class="links">
          ${r.google_maps?`<a class="gm" href="${r.google_maps}" target="_blank" rel="noopener">Google</a>`:''}
          ${r.amap?`<a class="am" href="${r.amap}" target="_blank" rel="noopener">Amap</a>`:''}
        </td>
      </tr>
    `).join('');
  }
  // Sort indicators
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.sort === state.sort.field) {
      th.classList.add(state.sort.dir==='asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

function render(){
  renderCityChips();
  renderCatChips();
  renderTable();
}

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const f = th.dataset.sort;
    if (state.sort.field === f) state.sort.dir = state.sort.dir==='asc' ? 'desc' : 'asc';
    else { state.sort.field = f; state.sort.dir = 'asc'; }
    renderTable();
  });
});

document.getElementById('search').addEventListener('input', e=>{ state.q=e.target.value; render(); });
document.getElementById('resetFilters').onclick = ()=>{
  state.city='all'; state.cats.clear(); state.q=''; state.sort = {field:'default', dir:'asc'};
  document.getElementById('search').value=''; render();
};
document.getElementById('exportFilteredCsv').onclick = ()=>{
  const list = filtered();
  const cols = ['Название','Категория','Город','Адрес (English)','Адрес (中文)','Google Maps','Amap'];
  const esc = s => '"' + String(s||'').replace(/"/g,'""') + '"';
  const out = [cols.join(',')].concat(list.map(r => [r.name,r.category,r.city,r.addr_en,r.addr_cn,r.google_maps,r.amap].map(esc).join(',')));
  const blob = new Blob(['﻿'+out.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'china_locations_filtered.csv'; a.click();
  URL.revokeObjectURL(url);
};

render();
</script>
</body>
</html>
