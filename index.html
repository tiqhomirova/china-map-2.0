<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Китай · локации (Шанхай · Чунцин)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#ffffff;--card:#f7f8fa;--card-h:#eef0f3;--border:#e3e6ec;
    --text:#1a1d23;--muted:#6b7280;
    --accent:#ff5b3a;--accent2:#1a73e8;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
  header{padding:14px 18px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex:0 0 auto}
  h1{margin:0 0 10px;font-size:17px;font-weight:600;letter-spacing:-0.01em}
  h1 .count{color:var(--muted);font-weight:400;font-size:12.5px;margin-left:8px}
  .filters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:7px}
  .search{flex:1;min-width:200px;max-width:380px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font:inherit;outline:none}
  .search:focus{border-color:var(--accent2)}
  .chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:18px;background:#fff;border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12.5px;user-select:none;transition:all .12s}
  .chip:hover{background:var(--card-h)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.city.active{background:var(--accent2);border-color:var(--accent2)}
  .chip .n{opacity:.7;margin-left:5px;font-size:11.5px}
  .chip .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
  .group{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .group-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
  .actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;padding-top:7px;border-top:1px solid var(--border)}
  .actions .chip{font-size:11.5px}
  .layout{flex:1;display:grid;grid-template-columns:1fr 380px;min-height:0}
  #map{background:#eef2f5}
  .leaflet-container{background:#eef2f5 !important;font-family:inherit !important}
  aside{overflow-y:auto;border-left:1px solid var(--border);padding:10px;background:var(--bg)}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:5px;margin-bottom:7px;cursor:pointer;transition:border-color .12s}
  .card:hover{border-color:#c8cdd6;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .card.focused{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
  .card-name{font-size:13.5px;font-weight:600;line-height:1.3}
  .card-cn{color:var(--muted);font-size:12px;margin-top:-2px}
  .card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:1px}
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:500;letter-spacing:.02em;gap:4px}
  .badge.city{background:rgba(26,115,232,.12);color:var(--accent2)}
  .badge.cat{background:rgba(255,91,58,.12);color:var(--accent)}
  .badge .dot{width:7px;height:7px;border-radius:50%}
  .card-addr{color:var(--muted);font-size:11.5px;line-height:1.45}
  .card-dist{color:var(--accent2);font-size:11px;font-weight:500}
  .links{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
  .btn{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--text);text-decoration:none;font-size:11px;font-weight:500;transition:all .12s;font-family:inherit;cursor:pointer;line-height:1.3}
  .btn:hover{background:var(--card-h);border-color:#c8cdd6}
  .btn.gm{color:#ea4335}.btn.am{color:#0091ea}.btn.bd{color:#3385ff}.btn.ap{color:#9aa0a6}
  .btn.photo{color:#7c3aed;border-color:rgba(124,58,237,.4)}
  .btn.photo:hover{background:rgba(124,58,237,.08)}
  .btn.visited-toggle{color:#22c55e;border-color:rgba(34,197,94,.4)}
  .btn.visited-toggle.on{background:#22c55e;color:#fff;border-color:#22c55e}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .visited-tick{display:inline-block;color:#22c55e;font-weight:600;margin-right:3px}

  .leaflet-popup-content-wrapper{border-radius:8px}
  .leaflet-popup-content{margin:10px 12px;font:13px/1.4 inherit}
  .leaflet-popup-content b{display:block;margin-bottom:4px}
  .leaflet-popup-content .pop-cn{color:var(--muted);font-size:12px;margin-bottom:4px}
  .leaflet-popup-content .pop-addr{color:var(--muted);font-size:11.5px;margin-bottom:6px}
  .leaflet-popup-content .pop-links{display:flex;gap:4px;flex-wrap:wrap}
  .leaflet-popup-content .pop-links a{padding:3px 7px;font-size:11px;text-decoration:none;border-radius:4px;border:1px solid var(--border);color:var(--text);background:#fff}

  .marker-pin{width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;transition:transform .15s;position:relative}
  .marker-pin.focused{transform:scale(1.4);outline:2px solid var(--accent2);outline-offset:2px;z-index:1000}
  .marker-pin.visited{opacity:.45}
  .marker-label{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:2px;background:rgba(255,255,255,.95);padding:1px 6px;border-radius:4px;border:1px solid var(--border);font-size:11px;font-weight:500;white-space:nowrap;pointer-events:none;box-shadow:0 1px 2px rgba(0,0,0,.08);max-width:140px;overflow:hidden;text-overflow:ellipsis;display:none}
  .show-labels .marker-label{display:block}
  .marker-pin.visited .marker-label{opacity:.6}

  @media(max-width:840px){
    .layout{grid-template-columns:1fr;grid-template-rows:55vh 1fr}
    aside{border-left:0;border-top:1px solid var(--border)}
  }
</style>
</head>
<body>
<header>
  <h1>Китай · локации <span class="count" id="count"></span></h1>
  <div class="filters">
    <input class="search" id="search" type="search" placeholder="Поиск по имени или адресу...">
    <div class="group" id="cities"></div>
  </div>
  <div class="filters">
    <span class="group-label">Категория</span>
    <div class="group" id="cats"></div>
  </div>
  <div class="actions">
    <span class="chip" id="exportFilteredCsv">⬇ CSV</span>
    <span class="chip" id="exportFilteredKml">⬇ KML</span>
    <span class="chip" id="copyFilteredAddr">⎘ Адреса</span>
    <span class="chip" id="locateMe">📍 Где я</span>
    <span class="chip" id="sortByDistance">↕ По расстоянию</span>
    <span class="chip" id="resetFilters">↻ Сбросить</span>
  </div>
</header>
<div class="layout">
  <div id="map"></div>
  <aside id="list"></aside>
</div>

const CAT_COLOR = {
  'Ресторан':'#ef4444','Кофейня':'#f97316','Шопинг':'#a855f7',
  'Отель':'#3b82f6','Достопримечательность':'#22c55e',
  'Развлечения':'#eab308','Другое':'#94a3b8'
};
const catColor = c => CAT_COLOR[c] || '#94a3b8';

const VISITED_KEY = 'china_locations_visited_v1';
function loadVisited(){
  try { return new Set(JSON.parse(localStorage.getItem(VISITED_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveVisited(s){
  try { localStorage.setItem(VISITED_KEY, JSON.stringify([...s])); } catch {}
}

const state = { city:'Shanghai', cats:new Set(), q:'', focusId:null, userLoc:null, sortByDist:false, visited: loadVisited(), labelZoom: 13 };

function rid(r){ return r.name + '|' + r.lat + ',' + r.lng; }
function shortLabel(r){
  const n = r.name_en || r.name;
  return n.length > 28 ? n.slice(0, 26) + '…' : n;
}

window.toggleVisited = function(id){
  if (state.visited.has(id)) state.visited.delete(id);
  else state.visited.add(id);
  saveVisited(state.visited);
  const m = markers.get(id);
  if (m) m.getElement().classList.toggle('visited', state.visited.has(id));
  renderList();
  if (m && m.getPopup() && m.isPopupOpen()){
    m.setPopupContent(popupHtml(m._row));
  }
};

// === MAP ===
const map = L.map('map', { zoomControl:true, preferCanvas:false }).setView([31.23, 121.47], 11);
// CARTO Voyager — light, mostly English labels for major POIs
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OSM &copy; CARTO',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

let userMarker = null;

function locateUser(){
  if (!navigator.geolocation){ flash('Геолокация не доступна'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude } = pos.coords;
    state.userLoc = { lat: latitude, lng: longitude };
    if (userMarker) userMarker.remove();
    userMarker = L.circleMarker([latitude, longitude], {
      radius: 8, color:'#fff', weight:2, fillColor:'#1a73e8', fillOpacity:0.9
    }).addTo(map).bindPopup('Вы здесь');
    map.flyTo([latitude, longitude], 15);
    flash('Местоположение определено');
    if (state.sortByDist) renderList();
  }, err => {
    flash('Не удалось определить местоположение');
    console.warn(err);
  }, { enableHighAccuracy:true, timeout:10000 });
}

const markerLayer = L.layerGroup().addTo(map);
const markers = new Map();

function escape(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function uniqueCounts(field){
  const m = new Map();
  for (const r of DATA) m.set(r[field], (m.get(r[field])||0)+1);
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}
function mkChip(label,n,active,extra,dotColor){
  const e = document.createElement('span');
  e.className = 'chip ' + (extra||'') + (active?' active':'');
  const dot = dotColor ? `<span class="dot" style="background:${dotColor}"></span>` : '';
  e.innerHTML = `${dot}${label}<span class="n">${n}</span>`;
  return e;
}
function renderCityChips(){
  const box = document.getElementById('cities'); box.innerHTML='';
  const all = mkChip('Все', DATA.length, state.city==='all','city');
  all.onclick = ()=>{state.city='all'; render();}; box.appendChild(all);
  for (const [c,n] of uniqueCounts('city')){
    const e = mkChip(c,n,state.city===c,'city');
    e.onclick=()=>{state.city=c; render();}; box.appendChild(e);
  }
}
function renderCatChips(){
  const box = document.getElementById('cats'); box.innerHTML='';
  for (const [c,n] of uniqueCounts('category')){
    const e = mkChip(c,n,state.cats.has(c),'',catColor(c));
    e.onclick=()=>{ state.cats.has(c)?state.cats.delete(c):state.cats.add(c); render(); };
    box.appendChild(e);
  }
}
function haversine(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const aa=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));
}
function fmtDist(km){
  if (km<1) return Math.round(km*1000)+' м';
  if (km<10) return km.toFixed(1)+' км';
  return Math.round(km)+' км';
}
function filtered(){
  const q = state.q.trim().toLowerCase();
  let out = DATA.filter(r=>{
    if (state.city!=='all' && r.city!==state.city) return false;
    if (state.cats.size && !state.cats.has(r.category)) return false;
    if (q){
      const hay = `${r.name} ${r.name_en||''} ${r.name_cn||''} ${r.address} ${r.category}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  if (state.sortByDist && state.userLoc){
    out = out.map(r=>({...r, _dist: r.lat!=null?haversine(state.userLoc,{lat:r.lat,lng:r.lng}):Infinity}))
             .sort((a,b)=>a._dist-b._dist);
  }
  return out;
}

function popupHtml(r){
  const id = rid(r);
  const isV = state.visited.has(id);
  const safeId = id.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  return `
    <b>${isV?'<span class="visited-tick">✓</span>':''}${escape(r.name_en||r.name)}</b>
    ${r.name_cn?`<div class="pop-cn">${escape(r.name_cn)}</div>`:''}
    <div class="pop-addr">${escape(r.address)}</div>
    <div class="pop-links">
      <a href="${r.google_maps}" target="_blank" rel="noopener">Google</a>
      ${r.google_maps_pin?`<a href="${r.google_maps_pin}" target="_blank" rel="noopener">📍 Pin</a>`:''}
      <a href="${r.amap}" target="_blank" rel="noopener">Amap</a>
      ${r.google_images?`<a href="${r.google_images}" target="_blank" rel="noopener">📸 Фото</a>`:''}
      <a href="javascript:void(0)" onclick="toggleVisited('${safeId}')" style="color:#22c55e">${isV?'✓ Просмотрено':'☐ Был?'}</a>
    </div>`;
}

function renderMap(list){
  markerLayer.clearLayers();
  markers.clear();
  const bounds = [];
  for (const r of list){
    if (r.lat==null) continue;
    const id = rid(r);
    const isV = state.visited.has(id);
    const isF = id === state.focusId;
    const html = `<div class="marker-pin ${isV?'visited':''} ${isF?'focused':''}" style="background:${catColor(r.category)}"><div class="marker-label">${escape(shortLabel(r))}</div></div>`;
    const icon = L.divIcon({ html, className:'', iconSize:[18,18], iconAnchor:[9,9] });
    const m = L.marker([r.lat, r.lng], { icon }).addTo(markerLayer);
    m._row = r;
    m.bindPopup(popupHtml(r), { maxWidth: 280 });
    m.on('click', () => {
      state.focusId = id;
      // Re-style markers
      for (const [mid, mk] of markers) {
        const el = mk.getElement()?.querySelector('.marker-pin');
        if (el) el.classList.toggle('focused', mid === id);
      }
      renderList();
    });
    markers.set(id, m);
    bounds.push([r.lat, r.lng]);
  }
  if (bounds.length && state.focusId == null){
    map.fitBounds(bounds, { padding:[40,40], maxZoom:14 });
  }
  // Show labels at high zoom
  const mapEl = document.getElementById('map');
  mapEl.classList.toggle('show-labels', map.getZoom() >= state.labelZoom);
}

function renderList(){
  const list = filtered();
  document.getElementById('count').textContent = `${list.length} из ${DATA.length}`;
  const aside = document.getElementById('list');
  if (!list.length){ aside.innerHTML='<div class="empty">Ничего не найдено</div>'; return; }
  aside.innerHTML = list.map(r=>{
    const id = rid(r);
    const focused = id === state.focusId;
    const isV = state.visited.has(id);
    const distHtml = (r._dist != null && isFinite(r._dist)) ? `<span class="card-dist">📍 ${fmtDist(r._dist)}</span>` : '';
    return `<div class="card ${focused?'focused':''}" data-id="${escape(id)}" style="${isV?'opacity:.65':''}">
      <div class="card-name">${isV?'<span class="visited-tick">✓</span>':''}${escape(r.name_en||r.name)}</div>
      ${r.name_cn?`<div class="card-cn">${escape(r.name_cn)}</div>`:''}
      <div class="card-meta">
        <span class="badge city">${escape(r.city)}</span>
        <span class="badge cat"><span class="dot" style="background:${catColor(r.category)}"></span>${escape(r.category)}</span>
        ${distHtml}
      </div>
      <div class="card-addr">${escape(r.address)}</div>
      <div class="links">
        <a class="btn gm" href="${r.google_maps}" target="_blank" rel="noopener">Google</a>
        ${r.google_maps_pin?`<a class="btn gm" href="${r.google_maps_pin}" target="_blank" rel="noopener">📍 Pin</a>`:''}
        <a class="btn am" href="${r.amap}" target="_blank" rel="noopener">Amap</a>
        <a class="btn bd" href="${r.baidu}" target="_blank" rel="noopener">Baidu</a>
        <a class="btn ap" href="${r.apple}" target="_blank" rel="noopener">Apple</a>
        ${r.google_images?`<a class="btn photo" href="${r.google_images}" target="_blank" rel="noopener">📸 Фото</a>`:''}
        <button class="btn visited-toggle ${isV?'on':''}" data-vid="${escape(id)}">${isV?'✓ Был':'☐ Был?'}</button>
      </div>
    </div>`;
  }).join('');
  aside.querySelectorAll('button.visited-toggle').forEach(b=>{
    b.addEventListener('click', e=>{ e.stopPropagation(); window.toggleVisited(b.getAttribute('data-vid')); });
  });
  aside.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', e=>{
      if (e.target.closest('a') || e.target.closest('button')) return;
      const id = el.getAttribute('data-id');
      const m = markers.get(id);
      state.focusId = id;
      if (m){
        map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 15), { animate:true });
        m.openPopup();
        for (const [mid, mk] of markers) {
          const e2 = mk.getElement()?.querySelector('.marker-pin');
          if (e2) e2.classList.toggle('focused', mid === id);
        }
      }
      renderList();
    });
  });
}

function render(){
  renderCityChips();
  renderCatChips();
  renderMap(filtered());
  renderList();
}

map.on('zoomend', () => {
  const mapEl = document.getElementById('map');
  mapEl.classList.toggle('show-labels', map.getZoom() >= state.labelZoom);
});

document.getElementById('search').addEventListener('input', e=>{ state.q=e.target.value; state.focusId=null; render(); });
document.getElementById('resetFilters').onclick = ()=>{
  state.city='Shanghai'; state.cats.clear(); state.q=''; state.focusId=null; state.sortByDist=false;
  document.getElementById('sortByDistance').classList.remove('active');
  document.getElementById('search').value=''; render();
};
document.getElementById('locateMe').onclick = locateUser;
document.getElementById('sortByDistance').onclick = ()=>{
  if (!state.userLoc){ flash('Сначала нажми «📍 Где я»'); return; }
  state.sortByDist = !state.sortByDist;
  document.getElementById('sortByDistance').classList.toggle('active', state.sortByDist);
  renderList();
};
document.getElementById('copyFilteredAddr').onclick = async ()=>{
  const list = filtered();
  const text = list.map(r=>`${r.name} — ${r.address}`).join('\n');
  try{ await navigator.clipboard.writeText(text); flash('Скопировано: '+list.length+' адресов'); }
  catch{ flash('Не удалось скопировать'); }
};
document.getElementById('exportFilteredCsv').onclick = ()=>{
  const list = filtered();
  const cols = ['Name','Address','Category','City','Lat','Lng','Google Maps','Amap','Baidu','Apple','Photo'];
  const esc = s => '"' + String(s||'').replace(/"/g,'""') + '"';
  const out = [cols.join(',')].concat(list.map(r=>[r.name,r.address,r.category,r.city,r.lat??'',r.lng??'',r.google_maps,r.amap,r.baidu,r.apple,r.google_images||''].map(esc).join(',')));
  download('china_locations_filtered.csv','﻿'+out.join('\n'),'text/csv;charset=utf-8');
};
document.getElementById('exportFilteredKml').onclick = ()=>{
  const list = filtered();
  const xe = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  let out = '<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Китай · локации</name>';
  for (const r of list){
    if (r.lat==null) continue;
    out += `<Placemark><name>${xe(r.name)}</name><description>${xe(r.address)} · ${xe(r.city)} · ${xe(r.category)}</description><Point><coordinates>${r.lng},${r.lat},0</coordinates></Point></Placemark>`;
  }
  out += '</Document></kml>';
  download('china_locations_filtered.kml',out,'application/vnd.google-earth.kml+xml');
};

function download(name, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}
function flash(msg){
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#222',color:'#fff',padding:'10px 16px',borderRadius:'8px',zIndex:'1000',fontSize:'13px'});
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

render();
</script>
</body>
